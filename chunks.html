<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Webnovel Translator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #0d0f17;
            --surface: #13161f;
            --surface2: #1a1e2e;
            --border: rgba(255, 255, 255, 0.07);
            --accent: #7c6af7;
            --accent2: #5eead4;
            --accent-glow: rgba(124, 106, 247, 0.2);
            --text: #e2e8f0;
            --text-muted: #64748b;
            --danger: #f87171;
            --success: #4ade80;
            --warning: #fbbf24;
            --radius: 14px;
            --transition: 0.2s ease;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Header ──────────────────────────────────────────────────── */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(13, 15, 23, 0.92);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-title img {
            width: 28px;
            height: 28px;
        }

        .header-title h1 {
            font-size: 1rem;
            font-weight: 700;
        }

        .header-title .session-id {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-family: monospace;
        }

        .header-spacer {
            flex: 1;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* ── Status Banner ───────────────────────────────────────────── */
        #statusBanner {
            background: rgba(251, 191, 36, 0.12);
            border: 1px solid rgba(251, 191, 36, 0.25);
            color: var(--warning);
            padding: 10px 24px;
            font-size: 0.82rem;
            display: none;
        }

        #statusBanner.error {
            background: rgba(248, 113, 113, 0.12);
            border-color: rgba(248, 113, 113, 0.25);
            color: var(--danger);
        }

        #statusBanner.success {
            background: rgba(74, 222, 128, 0.12);
            border-color: rgba(74, 222, 128, 0.25);
            color: var(--success);
        }

        #statusBanner.info {
            background: rgba(124, 106, 247, 0.12);
            border-color: rgba(124, 106, 247, 0.25);
            color: var(--accent);
        }

        /* ── Overall progress bar ────────────────────────────────────── */
        #progressSection {
            padding: 12px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .progress-bar-track {
            height: 6px;
            background: var(--surface2);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 99px;
            transition: width 0.4s ease;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
        }

        #attemptProgress {
            margin-top: 8px;
        }

        /* ── Buttons ─────────────────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 7px 14px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all var(--transition);
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: #6a58e5;
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .btn-secondary {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: #252a3d;
        }

        .btn-danger {
            background: rgba(248, 113, 113, 0.15);
            color: var(--danger);
            border: 1px solid rgba(248, 113, 113, 0.3);
        }

        .btn-danger:hover {
            background: rgba(248, 113, 113, 0.25);
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 0.75rem;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ── Chunks list ─────────────────────────────────────────────── */
        #chunksContainer {
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding-bottom: 100px;
        }

        /* ── Chunk card ──────────────────────────────────────────────── */
        .chunk-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: box-shadow var(--transition);
        }

        .chunk-card.done {
            border-color: rgba(94, 234, 212, 0.15);
        }

        .chunk-card.error {
            border-color: rgba(248, 113, 113, 0.2);
        }

        .chunk-card.processing {
            border-color: rgba(124, 106, 247, 0.3);
            box-shadow: 0 0 20px rgba(124, 106, 247, 0.1);
        }

        .chunk-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            user-select: none;
        }

        .chunk-header:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .chunk-num {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .chunk-header-info {
            flex: 1;
            min-width: 0;
        }

        .chunk-header-title {
            font-size: 0.875rem;
            font-weight: 600;
        }

        .chunk-header-preview {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 1px;
        }

        .chunk-status-badge {
            font-size: 0.68rem;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 20px;
            flex-shrink: 0;
        }

        .status-pending {
            background: var(--surface2);
            color: var(--text-muted);
        }

        .status-processing {
            background: rgba(124, 106, 247, 0.2);
            color: var(--accent);
        }

        .status-done {
            background: rgba(94, 234, 212, 0.15);
            color: var(--accent2);
        }

        .status-error {
            background: rgba(248, 113, 113, 0.15);
            color: var(--danger);
        }

        .chunk-chevron {
            font-size: 0.7rem;
            color: var(--text-muted);
            transition: transform var(--transition);
        }

        .chunk-card.collapsed .chunk-chevron {
            transform: rotate(-90deg);
        }

        .chunk-body {
            padding: 16px;
        }

        .chunk-card.collapsed .chunk-body {
            display: none;
        }

        /* ── Streaming bar inside chunk ─────────────────────────────── */
        .chunk-micro-bar {
            height: 2px;
            background: var(--surface2);
            border-radius: 99px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .chunk-micro-fill {
            height: 100%;
            border-radius: 99px;
            width: 0;
            transition: width 0.3s;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
        }

        .chunk-micro-bar.pulse .chunk-micro-fill {
            animation: pulse-width 1s infinite alternate ease-in-out;
        }

        @keyframes pulse-width {
            from {
                width: 20%;
            }

            to {
                width: 90%;
            }
        }

        /* ── Part tabs ───────────────────────────────────────────────── */
        .part-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .part-tab {
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--surface2);
            color: var(--text-muted);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all var(--transition);
        }

        .part-tab.active {
            background: var(--accent-glow);
            color: var(--accent);
            border-color: var(--accent);
        }

        /* ── Translated content ──────────────────────────────────────── */
        .part-content {
            display: none;
        }

        .part-content.active {
            display: block;
        }

        .chunk-content-area {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            font-size: 0.875rem;
            line-height: 1.8;
            color: var(--text);
            max-height: 500px;
            overflow-y: auto;
        }

        .chunk-content-area p {
            margin-bottom: 0.75em;
        }

        .chunk-content-area img {
            max-width: 100%;
            border-radius: 6px;
            margin: 8px 0;
        }

        .chunk-content-area.streaming {
            border-color: var(--accent);
        }

        .chunk-error-box {
            background: rgba(248, 113, 113, 0.08);
            border: 1px solid rgba(248, 113, 113, 0.2);
            color: var(--danger);
            border-radius: 8px;
            padding: 12px;
            font-size: 0.82rem;
            line-height: 1.6;
        }

        /* ── Chunk action buttons ────────────────────────────────────── */
        .chunk-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        /* ── Floating bottom bar ─────────────────────────────────────── */
        #floatingBar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(19, 22, 31, 0.95);
            backdrop-filter: blur(14px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px 18px;
            display: flex;
            gap: 10px;
            align-items: center;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
            z-index: 200;
            max-width: calc(100vw - 40px);
            flex-wrap: wrap;
        }

        /* ── Toast ───────────────────────────────────────────────────── */
        #toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.82rem;
            font-weight: 500;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity 0.25s, transform 0.25s;
            pointer-events: none;
            z-index: 9999;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #toast.error {
            border-color: var(--danger);
            color: var(--danger);
        }

        #toast.success {
            border-color: var(--success);
            color: var(--success);
        }

        /* ── Loading spinner ─────────────────────────────────────────── */
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 600px) {
            .header {
                padding: 10px 14px;
            }

            #chunksContainer {
                padding: 12px 14px;
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-title">
            <img src="48.png" alt="logo" />
            <div>
                <h1>Webnovel Translator</h1>
                <div class="session-id" id="sessionId">Loading session...</div>
            </div>
        </div>
        <div class="header-spacer"></div>
        <div class="header-actions">
            <button class="btn btn-secondary btn-sm" id="reprocessAllBtn">↩ Reprocess All</button>
            <button class="btn btn-secondary btn-sm" id="copyAllBtn">📋 Copy All</button>
            <button class="btn btn-secondary btn-sm" id="downloadAllBtn">⬇ Download</button>
            <button class="btn btn-danger btn-sm" id="terminateBtn" style="display:none">⏹ Terminate</button>
        </div>
    </header>

    <div id="statusBanner"></div>

    <div id="progressSection">
        <div class="progress-labels">
            <span id="overallLabel">Initializing...</span>
            <span id="overallPercent">0%</span>
        </div>
        <div class="progress-bar-track">
            <div class="progress-bar-fill" id="overallBar" style="width:0%"></div>
        </div>
        <div id="attemptProgress" style="margin-top:8px;display:none">
            <div class="progress-labels">
                <span id="attemptLabel">Attempt</span>
                <span id="attemptPercent"></span>
            </div>
            <div class="progress-bar-track" style="height:3px">
                <div class="progress-bar-fill" id="attemptBar" style="width:0%;opacity:0.6"></div>
            </div>
        </div>
    </div>

    <div id="chunksContainer"></div>

    <div id="floatingBar">
        <span id="floatingStatus" style="font-size:0.8rem;color:var(--text-muted)">Ready</span>
        <button class="btn btn-primary btn-sm" id="copyAllBtnFloat">📋 Copy All</button>
        <button class="btn btn-secondary btn-sm" id="downloadAllBtnFloat">⬇ Download .txt</button>
    </div>

    <div id="toast"></div>

    <script src="browser-polyfill.min.js"></script>
    <script src="marked.min.js"></script>
    <script src="purify.min.js"></script>
    <script src="chunks.js"></script>
</body>

</html>
